# /etc/nginx/sites-available/ekhadi
# Symlink: sudo ln -s /etc/nginx/sites-available/ekhadi /etc/nginx/sites-enabled/ekhadi

# Redirect www → apex
server {
    listen 80;
    listen [::]:80;
    server_name www.e-khadi.co.za;
    return 301 https://e-khadi.co.za$request_uri;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name e-khadi.co.za;
    return 301 https://e-khadi.co.za$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name e-khadi.co.za www.e-khadi.co.za;

    # SSL — certificates from Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/e-khadi.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-khadi.co.za/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header Referrer-Policy           "strict-origin"           always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Static assets — cache aggressively (Next.js content-hashes filenames)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }
}